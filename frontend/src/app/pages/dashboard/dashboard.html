<div class="dashboard-container">
    <div class="dashboard-body mt-4">
        <h2 class="mb-4 text-2xl font-bold">Gyorsműveletek</h2>
        <div class="cards-grid">
            <p-card (click)="navigate('/add-donation')" styleClass="cursor-pointer hover:shadow-4 transition-all">
                <ng-template #title>
                    <div class="stat-title">
                        <span>Új Véradás</span>
                    </div>
                </ng-template>
                <p class="stat-desc">Új véradás létrehozása a nyilvántartásban.</p>
            </p-card>

            <p-card (click)="navigate('/view-donations')" styleClass="cursor-pointer hover:shadow-4 transition-all">
                <ng-template #title>
                    <div class="stat-title">
                        <span>Véradások Megtekintése</span>
                    </div>
                </ng-template>
                <p class="stat-desc">Kérdezd le a sikeres véradásokat.</p>
            </p-card>

            <p-card (click)="navigate('/locations')" styleClass="cursor-pointer hover:shadow-4 transition-all">
                <ng-template #title>
                    <div class="stat-title">
                        <span>Helyszínek</span>
                    </div>
                </ng-template>
                <p class="stat-desc">Véradó helyszínek kezelése és státuszuk.</p>
            </p-card>

            <p-card (click)="navigate('/donors')" styleClass="cursor-pointer hover:shadow-4 transition-all">
                <ng-template #title>
                    <div class="stat-title">
                        <span>Donorok</span>
                    </div>
                </ng-template>
                <p class="stat-desc">Kezeld a véradók adatait.</p>
            </p-card>
        </div>
    </div>
</div>
