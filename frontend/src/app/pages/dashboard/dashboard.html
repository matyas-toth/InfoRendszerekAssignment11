<div class="dashboard-container">
    <div class="dashboard-header">
        <div class="header-content">
            <h1>
                <i class="pi pi-th-large"></i>
                Dashboard
            </h1>
            <p-button
                label="Log Out"
                icon="pi pi-sign-out"
                severity="secondary"
                [outlined]="true"
                (onClick)="logout()"
            />
        </div>
    </div>

    <div class="dashboard-body">
        <div class="cards-grid">
            <p-card>
                <ng-template #title>
                    <div class="stat-title">
                        <i class="pi pi-heart"></i>
                        <span>Blood Donations</span>
                    </div>
                </ng-template>
                <p class="stat-desc">Manage and view blood donation records.</p>
            </p-card>

            <p-card>
                <ng-template #title>
                    <div class="stat-title">
                        <i class="pi pi-map-marker"></i>
                        <span>Locations</span>
                    </div>
                </ng-template>
                <p class="stat-desc">Manage donation locations and their status.</p>
            </p-card>

            <p-card>
                <ng-template #title>
                    <div class="stat-title">
                        <i class="pi pi-users"></i>
                        <span>Donors</span>
                    </div>
                </ng-template>
                <p class="stat-desc">Register and manage blood donors.</p>
            </p-card>
        </div>
    </div>
</div>
