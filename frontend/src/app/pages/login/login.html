<div class="login-wrapper">
    <p-card styleClass="login-card border-1 border-surface-200">
        <ng-template #title>
            <div class="card-title text-primary">
                <i class="pi pi-sign-in text-2xl"></i>
                <span>Log In</span>
            </div>
        </ng-template>
        <ng-template #subtitle>
            <span class="text-color-secondary">Enter your credentials to continue</span>
        </ng-template>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5 mt-4 p-fluid">
            <div>
                <label for="email" class="block font-medium mb-2">Email</label>
                <input
                    pInputText
                    id="email"
                    type="email"
                    formControlName="email"
                    placeholder="your@email.com"
                    [invalid]="isInvalid('email')"
                    class="w-full"
                />
                @if (isInvalid('email')) {
                    <small class="text-red-500 block mt-1">Valid email is required.</small>
                }
            </div>

            <div>
                <label for="password" class="block font-medium mb-2">Password</label>
                <p-password
                    id="password"
                    formControlName="password"
                    [feedback]="false"
                    [toggleMask]="true"
                    [invalid]="isInvalid('password')"
                    placeholder="Your password"
                    styleClass="w-full"
                    [inputStyle]="{ width: '100%' }"
                />
                @if (isInvalid('password')) {
                    <small class="text-red-500 block mt-1">Password is required.</small>
                }
            </div>

            <p-button
                type="submit"
                label="Log In"
                icon="pi pi-sign-in"
                [loading]="loading"
                styleClass="w-full mt-2"
            />

            <div class="register-link">
                <span class="text-color-secondary">Don't have an account?</span>
                <a routerLink="/register">Register here</a>
            </div>
        </form>
    </p-card>
</div>
